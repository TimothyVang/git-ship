# Release-on-tag for GitLab CI/CD, driven by git-ship.
#
# Drop this into your `.gitlab-ci.yml` (or `include:` it). The `release` job fires
# only on pushed tags and runs the same `git-ship --tag` call used on GitHub.
#
# IMAGE: `alpine/git` ships git; we add curl + python3, which git-ship needs for
# its REST API fallback (curl makes the call, python3 JSON-encodes the notes).
# `glab` is optional — if it is on PATH git-ship uses it, otherwise it falls back
# to the GitLab Releases REST API automatically.
#
# TOKEN: git-ship reads GITLAB_TOKEN, falling back to CI_JOB_TOKEN. CI_JOB_TOKEN is
# injected automatically but may lack release-API scope on some instances; if release
# creation is rejected, set a masked CI/CD variable GITLAB_TOKEN with `api` scope.
#
# PREREQUISITE: vendor the tool at `git-ship` (repo root) or `scripts/git-ship` and
# point the script path below at it. This template assumes the repo root.

release:
  stage: deploy
  image: alpine/git:latest
  rules:
    - if: $CI_COMMIT_TAG          # tag pipelines only
  variables:
    GIT_DEPTH: "0"               # full clone so note generation has history
  before_script:
    - apk add --no-cache curl python3 bash
  script:
    - bash git-ship --tag "$CI_COMMIT_TAG"
